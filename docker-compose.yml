version: "3.8"

services:
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-clinicalgestor}
    volumes:
      - mongo_data:/data/db
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      MONGO_URL: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-changeme}@mongodb:27017/${MONGO_DB:-clinicalgestor}?authSource=admin
      DB_NAME: ${MONGO_DB:-clinicalgestor}
      CORS_ORIGINS: ${FRONTEND_URL:-http://localhost}
      JWT_SECRET: ${JWT_SECRET:-cambia-esto-por-un-secreto-seguro}
      WEBHOOK_API_KEY: ${WEBHOOK_API_KEY:-}
      CLINIC_NAME: ${CLINIC_NAME:-Mi Clínica}
      CLINIC_LOGO_URL: ${CLINIC_LOGO_URL:-}
      CLINIC_PRIMARY_COLOR: ${CLINIC_PRIMARY_COLOR:-#0ea5e9}
      CLINIC_TIMEZONE: ${CLINIC_TIMEZONE:-America/Mexico_City}
      WORK_START: ${WORK_START:-8}
      WORK_END: ${WORK_END:-19}
      SLOT_DURATION: ${SLOT_DURATION:-30}
      APPOINTMENT_PRICE: ${APPOINTMENT_PRICE:-150}
      FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL:-}
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD:-}
      FIRST_ADMIN_NAME: ${FIRST_ADMIN_NAME:-Administrador}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: ${BACKEND_URL:-http://localhost:8001}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app_network

volumes:
  mongo_data:

networks:
  app_network:
    driver: bridge
